# nordix-dynamic-theme configuration
# Location: ~/.config/nordix/nordix-theme/nordix-dynamic-theme.conf


# -- Desktop -----------------------------------------------------------------
# Written to kdeglobals, gtk-3.0/settings.ini and gtk-4.0/settings.ini

ICON_THEME=Cosmic                # icon theme - must be installed in /usr/share/icons or ~/.local/share/icons
WIDGET_STYLE=Breeze              # Qt widget style - choices: Breeze | Fusion | Windows

FONT=Comfortaa                   # UI font - menus, labels and general interface text
FONT_SIZE=15
FONT_FIXED=Maple Mono            # monospace font - terminals and code editors
FONT_FIXED_SIZE=15

CURSOR_THEME=Nero-Cyber-Cyan     # cursor theme - must be installed in /usr/share/icons or ~/.icons
CURSOR_SIZE=34                   # cursor size in pixels - common: 24 | 32 | 34 | 48


# -- Pywal ------------------------------------------------------------------
# Controls color extraction from wallpaper into ~/.cache/wal/colors.json
# All values can be temporarily overridden with CLI flags: nordix-dynamic-theme -b colorthief

BACKEND=fast-colorthief          # color extraction algorithm - choices: fast-colorthief | colorthief | haishoku | colorz | wal
COLS16=foxify-lighten            # 16-color generation mode  - choices: foxify-lighten | foxify-darken | lighten | darken | dual
ALPHA=0.5                        # terminal background transparency - range: 0.0 (transparent) to 1.0 (opaque)
SATURATE=0.9                     # color saturation multiplier - range: 0.0 to 1.0
CONTRAST=0.3                     # contrast between foreground and background - range: 0.0 to 1.0
WAIT=4                           # seconds to wait before reading the wallpaper


# -- Qt color balance -------------------------------------------------------
# Mix ratios for Qt/KDE surface colors - blends wallpaper bg and fg
# 0.0 = identical to the first color, 1.0 = identical to the second color

BG_LIFT=0.05                     # bg_lift   - lifts raw bg toward fg before all mixing          (bg to fg)
VIEW_BG=0.15                     # view_bg   - content area background, slightly darker           (bg to black)
VIEW_ALT=0.08                    # view_alt  - alternating row color, keep lower than VIEW_BG     (bg to black)
RAISED=0.20                      # raised    - sidebar, panel and card backgrounds                (bg to fg)
HOVER=0.40                       # hover     - headerbar and hover highlight                      (bg to fg)
WM_ACTIVE=0.30                   # wm_active - focused window title bar                          (bg to fg)


# -- GTK color balance ------------------------------------------------------
# Mix ratios for GTK3 and GTK4 surface colors - same blending logic as Qt above
# 0.0 = identical to the first color, 1.0 = identical to the second color

SIDEBAR=0.30                     # sidebar   - GTK sidebar background                               (bg to fg)
GTK_DIALOG=0.25                  # dialog    - dialog window background                             (bg to fg)
GTK_POPOVER=0.25                 # popover   - popover and context menu background                   (bg to fg)
